<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시설물 신고 관리자</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:20px;
}

h1{
    margin-bottom:20px;
}

.stats{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.card{
    flex:1;
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

th{
    background:#1976d2;
    color:white;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
}

button{
    margin:2px;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.pre{
    background:#9c27b0;
    color:white;
}

.accept{
    background:#ff9800;
    color:white;
}

.progress{
    background:#2196f3;
    color:white;
}

.done{
    background:#4caf50;
    color:white;
}

.delete{
    background:#f44336;
    color:white;
}

.refresh{
    margin-bottom:15px;
}

/* 사진 확대 */
#viewer{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

#viewer img{
    width:auto;
    height:auto;
    max-width:90%;
    max-height:90%;
}
</style>

</head>

<body>

<h1>🧑‍💻 시설물 신고 관리자</h1>

<div class="stats" id="stats"></div>

<button class="refresh" onclick="load()">🔄 새로고침</button>
<button onclick="location.href='/dashboard.html'">
📊 대시보드
</button>

<table>

<thead>

<tr>
<th>사진</th>
<th>건물</th>
<th>위치</th>
<th>내용</th>
<th>상태</th>
<th>시간</th>
<th>관리</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<div id="viewer" onclick="closeViewer()">
<img id="bigImage">
</div>

<script>

async function load(){

    const res=await fetch("/reports");
    const data=await res.json();

    let pre=0;
    let accept=0;
    let progress=0;
    let done=0;

    data.forEach(r=>{

        if(r.status==="접수전") pre++;
        if(r.status==="접수") accept++;
        if(r.status==="진행중") progress++;
        if(r.status==="완료") done++;

    });

    document.getElementById("stats").innerHTML=`

    <div class="card">🟣 접수전<br>${pre}</div>

    <div class="card">🟡 접수<br>${accept}</div>

    <div class="card">🔵 진행중<br>${progress}</div>

    <div class="card">🟢 완료<br>${done}</div>

    <div class="card">📌 전체<br>${data.length}</div>

    `;

    document.getElementById("tbody").innerHTML=data.map(r=>`

<tr>

<td>
${(r.imageUrls || []).map(img =>
    `<img src="${img}" onclick="showImage('${img}')">`
).join("")}
</td>

<td>${r.building}</td>

<td>${r.location}</td>

<td>${r.content}</td>

<td>${r.status}</td>

<td>${r.time}</td>

<td>

<button class="pre"
onclick="update(${r.id},'접수전')">
접수전
</button>

<button class="accept"
onclick="update(${r.id},'접수')">
접수
</button>

<button class="progress"
onclick="update(${r.id},'진행중')">
진행중
</button>

<button class="done"
onclick="update(${r.id},'완료')">
완료
</button>

<br>

<button class="delete"
onclick="removeReport(${r.id})">
🗑 삭제
</button>

</td>

</tr>

`).join("");

}

async function update(id,status){

    await fetch("/status",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            id,
            status
        })

    });

    load();

}

async function removeReport(id){

    if(!confirm("정말 삭제하시겠습니까?")){
        return;
    }

    await fetch("/report/"+id,{
        method:"DELETE"
    });

    load();

}

function showImage(src){

    document.getElementById("viewer").style.display="flex";

    document.getElementById("bigImage").src=src;

}

function closeViewer(){

    document.getElementById("viewer").style.display="none";

}

load();

setInterval(load,5000);

</script>

</body>
</html>
