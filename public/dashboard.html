<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>신고 대시보드</title>


<style>

body {

    font-family: Arial, sans-serif;

    padding:20px;

    background:#f7f7f7;

}



h2 {

    margin-bottom:10px;

}



.stats {

    display:flex;

    gap:10px;

    margin-bottom:20px;

    flex-wrap:wrap;

}



.box {

    background:white;

    padding:15px 20px;

    border-radius:8px;

    box-shadow:
    0 2px 6px rgba(0,0,0,.1);

    font-size:16px;

    font-weight:bold;

}



table {

    width:100%;

    border-collapse:collapse;

    background:white;

}



th,
td {

    border-bottom:1px solid #eee;

    padding:10px;

    text-align:left;

    vertical-align:middle;

}



th {

    background:#fafafa;

}



img.thumb {

    width:60px;

    height:60px;

    object-fit:cover;

    border-radius:6px;

    cursor:pointer;

    margin-right:5px;

}



.status {

    padding:5px 10px;

    border-radius:5px;

    font-size:12px;

    color:white;

    display:inline-block;

}



.접수전 {

    background:purple;

}



.접수 {

    background:orange;

}



.진행중 {

    background:dodgerblue;

}



.완료 {

    background:green;

}



button {

    padding:8px 12px;

    margin-bottom:15px;

    cursor:pointer;

    border:none;

    border-radius:5px;

}



/* 사진 확대 */

#viewer {

    display:none;

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:rgba(0,0,0,.8);

    justify-content:center;

    align-items:center;

    z-index:999;

}



#viewer img {

    max-width:90%;

    max-height:90%;

    border-radius:10px;

}



</style>


</head>


<body>



<h2>
📊 신고 대시보드
</h2>




<button onclick="load()">

🔄 새로고침

</button>





<div class="stats" id="stats"></div>





<h3>
📋 전체 신고 목록
</h3>





<table>


<thead>


<tr>

<th>사진</th>

<th>건물</th>

<th>위치</th>

<th>내용</th>

<th>상태</th>

<th>시간</th>

</tr>


</thead>


<tbody id="tbody"></tbody>


</table>





<div id="viewer" onclick="closeViewer()">

<img id="bigImage">

</div>







<script>


// ==========================
// 데이터 불러오기
// ==========================


async function load(){


try{


const res =
await fetch("/reports");



const data =
await res.json();





let 접수전=0;

let 접수=0;

let 진행중=0;

let 완료=0;





data.forEach(d=>{


switch(d.status){


case "접수전":

접수전++;

break;



case "접수":

접수++;

break;



case "진행중":

진행중++;

break;



case "완료":

완료++;

break;



}



});







document
.getElementById("stats")
.innerHTML=`


<div class="box">

📌 전체 : ${data.length}

</div>


<div class="box">

🟣 접수전 : ${접수전}

</div>


<div class="box">

🟡 접수 : ${접수}

</div>


<div class="box">

🔵 진행중 : ${진행중}

</div>


<div class="box">

🟢 완료 : ${완료}

</div>


`;








document
.getElementById("tbody")
.innerHTML =



data.map(d=>`


<tr>


<td>


${

(d.imageUrls || []).length > 0


?

d.imageUrls.map(img=>`


<img

class="thumb"

src="${img.url}"

onclick="showImage('${img.url}')"

>


`).join("")



:

"사진 없음"

}



</td>





<td>

${d.building}

</td>





<td>

${d.location}

</td>





<td>

${d.content}

</td>





<td>


<span class="status ${d.status}">

${d.status}

</span>


</td>





<td>

${formatTime(d.time)}

</td>




</tr>


`).join("");




}

catch(e){


console.error(e);


alert("데이터 불러오기 실패");


}



}







// ==========================
// Firebase Timestamp 처리
// ==========================


function formatTime(time){

    if(!time){
        return "";
    }


    // Firebase Timestamp
    if(time.seconds){

        return new Date(
            time.seconds * 1000
        ).toLocaleString("ko-KR");

    }


    // 문자열 날짜
    if(typeof time === "string"){

        const date = new Date(time);


        if(!isNaN(date)){

            return date.toLocaleString("ko-KR");

        }

    }


    return "시간 없음";

}







// ==========================
// 사진 확대
// ==========================


function showImage(src){


document
.getElementById("viewer")
.style.display="flex";



document
.getElementById("bigImage")
.src=src;


}




function closeViewer(){


document
.getElementById("viewer")
.style.display="none";


}








load();



setInterval(
load,
5000
);



</script>


</body>

</html>
